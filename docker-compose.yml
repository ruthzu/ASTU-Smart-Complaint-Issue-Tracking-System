version: "3.9"

services:
  backend:
    build: .
    container_name: astu-backend
    restart: always
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - ./uploads:/app/uploads  # keep only uploads mapped
    command: sh -c "npm install && npm run build && node dist/main.js"  # build & run inside container

  db:
    image: postgres:16-alpine
    container_name: astu-postgres
    restart: always
    environment:
      POSTGRES_USER: astuuser
      POSTGRES_PASSWORD: astupass
      POSTGRES_DB: astudb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: